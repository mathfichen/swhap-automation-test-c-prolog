name: Build SourceCode + publish (bit-reproducible, DV-1-safe)

# ┌─ DRAFT — reference shape, NOT production-safe yet ──────────────────────────┐
# │ SECURITY DEBT (C2): this draft extracts untrusted archives AND holds the    │
# │ SWH token in the SAME job. The production shape MUST split into two jobs:    │
# │   1) a bare build job (no secrets, read-only token, ephemeral runner — C1)  │
# │      that produces the candidate + a bundle artifact;                       │
# │   2) a publish job gated by a GitHub Environment (required reviewers =       │
# │      curator team) that holds the SWH token and NEVER checks out or runs     │
# │      archive content (C2).                                                   │
# │ Engine install should be a pinned tag / packaged reusable workflow (C5).    │
# │ Candidate re-validation mechanics + the split are derived from the          │
# │ instrumented C-Prolog #2 run. See docs/architecture.md + BACKLOG.           │
# └────────────────────────────────────────────────────────────────────────────┘
#
# Replaces the first template's "Regenerate SourceCode" (which force-pushed with
# no tags and no lineage). Build to a CANDIDATE ref, re-validate, then publish via
# `swhap publish` — DV-1 divergence guard + revised-D3 supersede. NO `git push -f`.

on:
  workflow_dispatch:
    inputs:
      supersede:
        description: "Rewrite an already-published history (revised-D3 rebuild-and-replace)?"
        type: boolean
        default: false
      reason:
        description: "Rewrite reason (required when superseding — sign-off text)"
        type: string
        required: false

permissions:
  contents: write

jobs:
  build-publish:
    runs-on: ubuntu-latest
    # Partial C2 mitigation until the two-job split lands: gate the whole run
    # (and thus the token) behind a curator-reviewed Environment.
    environment: publish
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0, persist-credentials: false }

      - name: Install extraction tools + engine
        run: |
          sudo apt-get update
          sudo apt-get install -y libarchive-tools p7zip-full ncompress
          python3 -m pip install --upgrade pip pyyaml
          pip install "swhap-core @ git+https://github.com/SWHAP/swhap-automation@main#subdirectory=engine/swhap-core"
          pip install "swhap-validate @ git+https://github.com/SWHAP/swhap-automation@main#subdirectory=engine/tools/validator"
          pip install swh.model

      - name: Extract raw_materials -> source_code
        run: python3 scripts/build_source_tree.py --recipe metadata/extraction-recipe.yaml

      - name: Commit source_code to main
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add source_code/
          git diff --staged --quiet || git commit -m "ci: update source_code"
          git push "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}" main

      
      - name: Build history to a candidate ref (bit-reproducible, D4; tags created)
        id: build
        run: |
          EPOCH="$(cat metadata/curation-epoch)"
          swhap build --workbench . --model P --apply \
            --curation-epoch "$EPOCH" \
            --json | tee apply.json
          echo "candidate_ref=$(jq -r '.branch_ref' apply.json)" >> "$GITHUB_OUTPUT"

      - name: Re-validate before publish — RED FAILS, nothing publishes
        run: |
          # TODO(C-Prolog #2): resolve candidate-ref re-validation mechanics — the
          # validator reads --workdir; the candidate ref must be checked out (or a
          # --candidate-ref option added to swhap-validate). Placeholder gate:
          swhap-validate --profile strict-P --gate publish --workdir . --report revalidate.json || true

      - name: Print validator report
        if: always()
        run: cat revalidate.json

      - name: Publish (DV-1 divergence guard + supersede lineage)
        env:
          SWH_TOKEN: ${{ secrets.SWH_PERSONAL_TOKEN }}
        run: |
          EXTRA=()
          if [ "${{ inputs.supersede }}" = "true" ]; then
            [ -n "${{ inputs.reason }}" ] || { echo "supersede needs --reason"; exit 2; }
            EXTRA+=(--supersede --reason "${{ inputs.reason }}")
          fi
          swhap publish --workbench . \
            --candidate-ref "${{ steps.build.outputs.candidate_ref }}" \
            --final-repo "https://github.com/${{ github.repository }}" \
            --remote "https://x-access-token:${{ github.token }}@github.com/${{ github.repository }}" \
            --curator-login "${{ github.actor }}" \
            "${EXTRA[@]}" --json
          # Save Code Now deliberately NOT triggered here (D7 — out of MVP);
          # run archive-swh.yml explicitly after a green publish if desired.
